<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />

  <title>Home</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.5.1/css/all.css">
</head>

<body class="bg-gray-100">

<div class="min-h-screen pb-24">

  <!-- ================= HEADER PROFILE ================= -->
  <div class="w-full bg-[url('img/bg.png')] bg-cover bg-center 
              text-white rounded-b-3xl p-6 shadow-md">

    <div class="flex flex-col items-center text-center">

      <!-- Judul -->
      <h1 class="text-2xl font-bold mb-4">Profil</h1>

      <!-- Foto -->
      <img src="https://i.pravatar.cc/150"
           class="w-24 h-24 rounded-full border-4 border-white 
                  object-cover shadow-md">

      <!-- Nama -->
      <h2 class="text-2xl font-semibold mt-3">Faisal Amin</h2>
      <p class="text-sm text-white/80">Guru RPL</p>

    </div>

    <!-- 3 MENU GRID -->
    <div class="grid grid-cols-3 gap-3 mt-6">

      <!-- Notif -->
      <div class="bg-white/20 backdrop-blur-sm rounded-xl p-3 
                  flex flex-col items-center 
                  hover:bg-white/30 transition cursor-pointer">

        <i class="fa-light fa-bell text-xl mb-1"></i>
        <span class="text-xs">Notif</span>
      </div>

      <!-- Jadwal -->
      <div class="bg-white/20 backdrop-blur-sm rounded-xl p-3 
                  flex flex-col items-center 
                  hover:bg-white/30 transition cursor-pointer">

        <i class="fa-light fa-calendar-days text-xl mb-1"></i>
        <span class="text-xs">Jadwal</span>
      </div>

      <!-- History -->
      <div class="bg-white/20 backdrop-blur-sm rounded-xl p-3 
                  flex flex-col items-center 
                  hover:bg-white/30 transition cursor-pointer">

        <i class="fa-light fa-clock-rotate-left text-xl mb-1"></i>
        <span class="text-xs">History</span>
      </div>

    </div>
  </div>

  <!-- ================= MENU LIST ================= -->
  <div class="mt-6 px-5 max-w-md mx-auto divide-y divide-gray-200">

    <!-- Edit Profile -->
    <div class="group flex items-center justify-between py-4 
                cursor-pointer transition duration-300">

      <div class="flex items-center gap-3">
        <i class="fa-light fa-user-pen text-blue-600 text-lg 
                  transition duration-300 group-hover:scale-110"></i>

        <span class="font-medium relative 
                     after:absolute after:left-0 after:-bottom-1 
                     after:h-[2px] after:w-0 
                     after:bg-blue-600 
                     after:transition-all after:duration-300 
                     group-hover:after:w-full">
          Edit Profile
        </span>
      </div>

      <i class="fa-light fa-chevron-right text-gray-400 
                transition duration-300 
                group-hover:translate-x-2 
                group-hover:text-blue-600"></i>
    </div>


    <!-- Help & Support -->
    <div class="group flex items-center justify-between py-4 
                cursor-pointer transition duration-300">

      <div class="flex items-center gap-3">
        <i class="fa-light fa-headset text-green-600 text-lg 
                  transition duration-300 group-hover:scale-110"></i>

        <span class="font-medium relative 
                     after:absolute after:left-0 after:-bottom-1 
                     after:h-[2px] after:w-0 
                     after:bg-green-600 
                     after:transition-all after:duration-300 
                     group-hover:after:w-full">
          Help & Support
        </span>
      </div>

      <i class="fa-light fa-chevron-right text-gray-400 
                transition duration-300 
                group-hover:translate-x-2 
                group-hover:text-green-600"></i>
    </div>


    <!-- Feedback -->
    <div class="group flex items-center justify-between py-4 
                cursor-pointer transition duration-300">

      <div class="flex items-center gap-3">
        <i class="fa-light fa-comment-dots text-purple-600 text-lg 
                  transition duration-300 group-hover:scale-110"></i>

        <span class="font-medium relative 
                     after:absolute after:left-0 after:-bottom-1 
                     after:h-[2px] after:w-0 
                     after:bg-purple-600 
                     after:transition-all after:duration-300 
                     group-hover:after:w-full">
          Feedback Aplikasi
        </span>
      </div>

      <i class="fa-light fa-chevron-right text-gray-400 
                transition duration-300 
                group-hover:translate-x-2 
                group-hover:text-purple-600"></i>
    </div>

    <!-- Logout Clean -->
    <div class="py-5 text-center text-red-500 font-semibold 
                cursor-pointer hover:text-red-600 transition">
      
      <a href="login.html">

      <i class="fa-light fa-right-from-bracket mr-2"></i>
      Logout
      </a>
    </div>

  </div>

</div>

<!-- ================= NAVBAR BAWAH ================= -->
<nav class="fixed bottom-2 left-2 right-2 
            h-16 bg-white rounded-2xl shadow-lg 
            border border-gray-200">

  <div class="flex h-full">

    <!-- HOME -->
    <a href="index.html"
       class="flex-1 flex flex-col items-center justify-center text-gray-500">
      <i class="fa-light fa-house text-xl"></i>
      <span class="text-xs mt-1">Home</span>
    </a>

    <!-- JURNAL -->
    <a href="#"
       class="flex-1 flex flex-col items-center justify-center text-gray-500">
      <i class="fa-light fa-book-open text-xl"></i>
      <span class="text-xs mt-1">Jurnal</span>
    </a>

    <!-- AKUN (ACTIVE) -->
    <a href="profile.html"
       class="flex-1 flex flex-col items-center justify-center text-blue-600">
      <i class="fa-light fa-user text-xl"></i>
      <span class="text-xs mt-1">Akun</span>
    </a>

  </div>
</nav>

</body>
</html>
