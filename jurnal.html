<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />

  <title>Home</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.5.1/css/all.css">
</head>

<body class="bg-gradient-to-br from-blue-50 via-white to-blue-100">

<div class="min-h-screen pb-24 px-4 pt-6 max-w-md mx-auto">

  <!-- ================= HEADER CARD ================= -->
  <div class="bg-white rounded-2xl shadow-md p-5 mb-6">

    <h1 class="text-xl font-bold text-gray-800">
      Input Jurnal Mengajar
    </h1>

    <!-- Nama Guru (ambil dari login) -->
    <p class="text-sm text-gray-500 mt-1">
      Guru: <span class="font-semibold text-blue-600">Faisal Amin</span>
    </p>

  </div>

  <!-- ================= FORM CARD ================= -->
  <div class="bg-white rounded-2xl shadow-md p-5 space-y-5">

    <!-- KELAS & JURUSAN -->
    <div class="grid grid-cols-2 gap-4">
      
      <div>
        <label class="text-sm font-semibold text-gray-700">Kelas</label>
        <select class="w-full mt-1 p-3 rounded-xl border border-gray-200 
                       focus:ring-2 focus:ring-blue-500 focus:outline-none">
          <option>X</option>
          <option>XI</option>
          <option>XII</option>
        </select>
      </div>

      <div>
        <label class="text-sm font-semibold text-gray-700">Jurusan</label>
        <select class="w-full mt-1 p-3 rounded-xl border border-gray-200 
                       focus:ring-2 focus:ring-blue-500 focus:outline-none">
          <option>AKL</option>
          <option>MPLB</option>
          <option>PPLG</option>
          <option>TKJ</option>
          <option>DKV</option>
        </select>
      </div>

    </div>

    <!-- JAM KE -->
    <div>
      <label class="text-sm font-semibold text-gray-700">Mengajar Jam Ke</label>
      <select class="w-full mt-1 p-3 rounded-xl border border-gray-200 
                     focus:ring-2 focus:ring-blue-500 focus:outline-none">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
      </select>
    </div>

    <!-- KEHADIRAN -->
    <div>
      <p class="text-sm font-semibold text-gray-700 mb-2">Data Kehadiran</p>

      <div class="grid grid-cols-3 gap-3">
        <input id="sakit" type="number" placeholder="Sakit"
          class="p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none">

        <input id="izin" type="number" placeholder="Izin"
          class="p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none">

        <input id="alpa" type="number" placeholder="Alpa"
          class="p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
    </div>

    <!-- TOTAL SISWA -->
    <div>
      <label class="text-sm font-semibold text-gray-700">Total Siswa</label>
      <input id="total" type="number"
        class="w-full mt-1 p-3 rounded-xl border border-gray-200 
               focus:ring-2 focus:ring-blue-500 focus:outline-none">
    </div>

    <!-- SISWA MASUK OTOMATIS -->
    <div>
      <label class="text-sm font-semibold text-gray-700">Siswa Masuk</label>
      <input id="masuk" type="number" readonly
        class="w-full mt-1 p-3 rounded-xl border bg-gray-100 text-gray-600">
    </div>

    <!-- KETERANGAN -->
    <div>
      <label class="text-sm font-semibold text-gray-700">Keterangan</label>
      <textarea rows="3"
        class="w-full mt-1 p-3 rounded-xl border border-gray-200 
               focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
    </div>

    <!-- RINGKASAN -->
    <div>
      <label class="text-sm font-semibold text-gray-700">Ringkasan Materi</label>
      <textarea rows="4"
        class="w-full mt-1 p-3 rounded-xl border border-gray-200 
               focus:ring-2 focus:ring-blue-500 focus:outline-none"
        placeholder="Tuliskan materi hari ini..."></textarea>
    </div>

    <!-- FOTO KELAS -->
    <div>
      <label class="text-sm font-semibold text-gray-700 block mb-2">
        Foto Keadaan Kelas
      </label>

      <label class="flex flex-col items-center justify-center p-6 
                    border-2 border-dashed border-blue-300 
                    rounded-xl cursor-pointer
                    hover:bg-blue-50 transition">

        <i class="fa-light fa-camera text-3xl text-blue-600 mb-2"></i>
        <span class="text-sm text-gray-500">Ambil Foto</span>

        <input type="file" id="cameraInput" accept="image/*" class="hidden">
<!--
        <input type="file" accept="image/*" capture="environment" class="hidden">
        -->
      </label>
    </div>

  </div>

  <!-- SUBMIT -->
  <button class="w-full bg-blue-600 text-white p-3 mt-6 
                 rounded-xl font-semibold
                 transition duration-300 
                 hover:scale-105 active:scale-95 shadow-md">
    Simpan Jurnal
  </button>

</div>

</body>
</html>
